{{ template "openbao.mode" . }}
{{- if ne .mode "external" }}
{{- $btpCRD := .Capabilities.APIVersions.Has (printf "%s/BackendTLSPolicy" .Values.server.gateway.tlsPolicy.apiVersion) -}}
{{- /*
BackendTLSPolicy implements TLS re-encrypt: the gateway terminates the client
TLS and opens a new TLS connection to the OpenBao backend, validating the
backend certificate. This matches the seaweedfs re-encrypt mode used when the
certificate is chart-generated (source=certManager). Only rendered when TLS is
enabled, the policy is requested and the BackendTLSPolicy CRD is present.
*/ -}}
{{- if and (not .Values.global.tlsDisable) .Values.server.gateway.tlsPolicy.enabled $btpCRD -}}
{{- $serviceName := include "openbao.fullname" . -}}
{{- template "openbao.serverServiceEnabled" . -}}
{{- if .serverServiceEnabled -}}
{{- if and (eq .mode "ha" ) (eq (.Values.server.gateway.tlsPolicy.activeService | toString) "true") }}
{{- $serviceName = printf "%s-%s" $serviceName "active" -}}
{{- end }}
apiVersion: {{ .Values.server.gateway.tlsPolicy.apiVersion }}
kind: BackendTLSPolicy
metadata:
  name: {{ template "openbao.fullname" . }}
  namespace: {{ include "openbao.namespace" . }}
  labels:
    helm.sh/chart: {{ include "openbao.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    {{- with .Values.server.gateway.tlsPolicy.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- template "openbao.gateway.tlsPolicy.annotations" . }}
spec:
  targetRefs:
  {{- if .Values.server.gateway.tlsPolicy.targetRefs }}
  {{- with .Values.server.gateway.tlsPolicy.targetRefs }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  - group: ''
    kind: Service
    name: {{ $serviceName }}
    sectionName: {{ include "openbao.scheme" . }}
  {{- end }}
  validation:
    {{- if .Values.server.gateway.tlsPolicy.validation }}
      {{- toYaml .Values.server.gateway.tlsPolicy.validation | nindent 4 }}
    {{- else }}
    # Default: validate the OpenBao backend certificate against the CA stored in
    # the chart's TLS secret (re-encrypt mode). Override via
    # server.gateway.tlsPolicy.validation.
    caCertificateRefs:
      - group: ''
        kind: Secret
        name: {{ template "openbao.tls.secretName" . }}
    {{- end }}
    hostname: {{ include "openbao.fullname" . }}
{{- end }}
{{- end }}
{{- end }}
