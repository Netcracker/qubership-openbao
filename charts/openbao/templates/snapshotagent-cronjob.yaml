{{- if .Values.snapshotAgent.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
  {{- template "openbao.snapshotAgent.annotations" . }}
  name: {{ template "openbao.fullname" . }}-snapshot
  namespace: {{ include "openbao.namespace" . }}
spec:
  schedule: {{ .Values.snapshotAgent.schedule | quote }}
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "openbao.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: snapshot-agent
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "openbao.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            component: snapshot-agent
        spec:
          restartPolicy: {{ .Values.snapshotAgent.restartPolicy }}
          serviceAccountName: {{  template "openbao.snapshotAgent.serviceAccount.name" . }}
          {{ template "snapshotAgent.securityContext.pod" .}}
          {{ template "snapshotAgent.tolerations" . }}
          containers:
          - name: bao-snapshot
            envFrom:
            - configMapRef:
                name: {{ template "openbao.fullname" . }}-snapshot
            env:
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: AWS_SECRET_ACCESS_KEY
                  name: {{ .Values.snapshotAgent.s3CredentialsSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  key: AWS_ACCESS_KEY_ID
                  name: {{ .Values.snapshotAgent.s3CredentialsSecret }}
            {{- include "openbao.extraSecretEnvironmentVars" .Values.snapshotAgent | nindent 12 }}
            {{- include "openbao.extraEnvironmentVars" .Values.snapshotAgent | nindent 12 }}
            image: {{ .Values.snapshotAgent.image.repository }}:{{ .Values.snapshotAgent.image.tag }}
            {{ template "openbao.snapshotAgent.resources". }}
            {{ template "snapshotAgent.securityContext.container" .}}
            volumeMounts:
              - name: snapshot-dir
                mountPath: /bao-snapshots
              {{- if eq (include "openbao.tlsEnabled" .) "true" }}
              - name: tls
                readOnly: true
                mountPath: {{ .Values.server.tls.mountPath }}
              {{- end }}
              {{- with .Values.snapshotAgent.extraVolumeMounts }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
            imagePullPolicy: IfNotPresent
          volumes:
          - name: snapshot-dir
            emptyDir: {}
          {{- if eq (include "openbao.tlsEnabled" .) "true" }}
          - name: tls
            secret:
              secretName: {{ template "openbao.tls.secretName" . }}
              defaultMode: 420
          {{- end }}
          {{- if .Values.snapshotAgent.extraVolumes }}
            {{- toYaml .Values.snapshotAgent.extraVolumes | nindent 10 }}
          {{- end }}
{{ end }}
