{{ template "openbao.mode" . }}
{{- if ne .mode "external" }}
{{- $tlsRouteCRD := .Capabilities.APIVersions.Has (printf "%s/TLSRoute" .Values.server.gateway.tlsRoute.apiVersion) -}}
{{- /*
TLSRoute implements TLS passthrough: the gateway forwards the encrypted stream
and OpenBao terminates TLS. This matches the seaweedfs passthrough mode used
when the certificate is not chart-generated (source=rawCerts / existingSecret).
Only rendered when the TLSRoute CRD is present in the cluster.
*/ -}}
{{- if and .Values.server.gateway.tlsRoute.enabled $tlsRouteCRD -}}
{{- $serviceName := include "openbao.fullname" . -}}
{{- template "openbao.serverServiceEnabled" . -}}
{{- if .serverServiceEnabled -}}
{{- if and (eq .mode "ha" ) (eq (.Values.server.gateway.tlsRoute.activeService | toString) "true") }}
{{- $serviceName = printf "%s-%s" $serviceName "active" -}}
{{- end }}
{{- $servicePort := .Values.server.service.port -}}
{{- $kubeVersion := .Capabilities.KubeVersion.Version }}
apiVersion: {{ .Values.server.gateway.tlsRoute.apiVersion }}
kind: TLSRoute
metadata:
  name: {{ template "openbao.fullname" . }}
  namespace: {{ include "openbao.namespace" . }}
  labels:
    helm.sh/chart: {{ include "openbao.chart" . }}
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    app.kubernetes.io/component: tlsroute
    deployment.netcracker.com/ingress-type: private-network
    deployment.netcracker.com/ingress-audience-type: ops-user
    {{- with .Values.server.gateway.tlsRoute.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- template "openbao.gateway.tlsRoute.annotations" . }}
spec:
  hostnames:
  {{- range .Values.server.gateway.tlsRoute.hosts }}
    - {{ . | quote }}
  {{- end }}
  parentRefs:
  {{- with .Values.server.gateway.tlsRoute.parentRefs }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ $serviceName }} 
          port: {{ $servicePort }}
{{- end }}
{{- end }}
{{- end }}
