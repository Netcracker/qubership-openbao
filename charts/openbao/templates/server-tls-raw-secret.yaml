{{ template "openbao.mode" . }}
{{- if ne .mode "external" }}
{{- if ne .mode "dev" }}
{{- if .serverEnabled -}}
{{- if eq (include "openbao.tls.useRawCerts" .) "true" -}}
# kubernetes.io/tls secret built from inline PEM material.
# Generated because global.tlsDisable=false, server.tls.source=rawCerts and
# both server.tls.certs.crt and server.tls.certs.key are set. Created via Helm
# pre-install/pre-upgrade hooks so it exists before the server pod starts.
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "openbao.tls.secretName" . }}
  namespace: {{ include "openbao.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    helm.sh/chart: {{ include "openbao.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    app.kubernetes.io/component: server
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
type: kubernetes.io/tls
data:
  {{ .Values.server.tls.certKey }}: {{ .Values.server.tls.certs.crt | b64enc | quote }}
  {{ .Values.server.tls.keyKey }}: {{ .Values.server.tls.certs.key | b64enc | quote }}
  {{- with .Values.server.tls.certs.ca }}
  {{ $.Values.server.tls.caKey }}: {{ . | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
