# Available parameters and their default values for the OpenBao chart.

global:
  # -- enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true

  # -- The namespace to deploy to. Defaults to the `helm` installation namespace.
  namespace: ""

  # -- Image pull secret to use for registry authentication.
  # Alternatively, the value may be specified as an array of strings.
  imagePullSecrets: []
  # imagePullSecrets:
  #   - name: image-pull-secret

  # -- TLS for end-to-end encrypted transport
  tlsDisable: true

  # -- External openbao server address for the injector and CSI provider to use.
  # Setting this will disable deployment of an OpenBao server.
  externalBaoAddr: ""
  # -- Deprecated: Please use global.externalBaoAddr instead.
  externalVaultAddr: ""

  # -- If deploying to OpenShift
  openshift: false

  serverTelemetry:
    # -- Enable integration with the Prometheus Operator
    # See the top level serverTelemetry section below before enabling this feature.
    prometheusOperator: false


server:
  # If true, or "-" with global.enabled true, OpenBao server will be installed.
  # See openbao.mode in _helpers.tpl for implementation details.
  enabled: "-"

  # Resource requests, limits, etc. for the server cluster placement. This
  # should map directly to the value of the resources field for a PodSpec.
  # By default no direct resource request is made.

  #image: quay.io/openbao/openbao:2.5
  image:
    # -- image registry to use for server image
    registry: "quay.io"
    # -- image repo to use for server image
    repository: "quay.io/openbao/openbao"
    # -- image tag to use for server image - defaults to chart appVersion
    tag: "2.5"
    # -- image pull policy to use for server image. if tag is "latest", set to "Always"
    pullPolicy: IfNotPresent

  # Configure the Update Strategy Type for the StatefulSet
  # See https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  updateStrategyType: "OnDelete"

  # Configure the pod management policy for the StatefulSet
  # See https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#pod-management-policies
  podManagementPolicy: "OrderedReady"

  # Configure the logging verbosity for the OpenBao server.
  # Supported log levels include: trace, debug, info, warn, error
  logLevel: ""

  # Configure the logging format for the OpenBao server.
  # Supported log formats include: standard, json
  logFormat: ""

  resources: {}
  # resources:
  #   requests:
  #     memory: 256Mi
  #     cpu: 250m
  #   limits:
  #     memory: 256Mi
  #     cpu: 250m

  # Ingress allows ingress services to be created to allow external access
  # from Kubernetes to access OpenBao pods.
  # If deployment is on OpenShift, the following block is ignored.
  # In order to expose the service, use the route section below
  ingress:
    enabled: false
    labels: {}
      # traffic: external
    annotations: {}
      # |
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
      #   or
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # Optionally use ingressClassName instead of deprecated annotation.
    # See: https://kubernetes.io/docs/concepts/services-networking/ingress/#deprecated-annotation
    ingressClassName: ""

    # As of Kubernetes 1.19, all Ingress Paths must have a pathType configured. The default value below should be sufficient in most cases.
    # See: https://kubernetes.io/docs/concepts/services-networking/ingress/#path-types for other possible values.
    pathType: Prefix

    # When HA mode is enabled and K8s service registration is being used,
    # configure the ingress to point to the OpenBao active service.
    activeService: true
    hosts:
      - host: chart-example.local
        paths: []
    ## Extra paths to prepend to the host configuration. This is useful when working with annotation based services.
    extraPaths: []
    # - path: /*
    #   backend:
    #     service:
    #       name: ssl-redirect
    #       port:
    #         number: use-annotation
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # Gateway consolidates configuration related to the Kubernetes Gateway API
  # Currently, only creating a TLSRoute is supported
  # See: https://gateway-api.sigs.k8s.io/
  gateway:
    # Configures a TLSRoute for the OpenBao server. This can be enabled independently of the ingress configuration to allow for side-by-side scenarios for migration.
    tlsRoute:
      enabled: false
      labels: {}
      # traffic: external
      annotations: {}
      # external-dns.alpha.kubernetes.io/hostname: chart-example.local

      hosts: []
        # - chart-example.local

      # Allows overriding the TLSRoutes apiVersion in case a different version of Gateway API is installed on the cluster.
      apiVersion: gateway.networking.k8s.io/v1alpha3

      # When HA mode is enabled and K8s service registration is being used,
      # configure the ingress to point to the OpenBao active service.
      activeService: true

      # List of ParentRefs. As the helm chart configures no gateways itself,
      # this should be set to at least one gateway with one or more TLS listeners
      parentRefs: []
        # - name: my-gw
        #   namespace: gateway-namespace
        #   # sectionName is optional to fix to a specific listener
        #   sectionName: listener-name

    # Configures a HTTPRoute for the OpenBao server. This can be enabled independently of the ingress configuration to allow for side-by-side scenarios for migration.
    # WARNING: Terminating TLS before reaching the OpenBao Server is not recommended and may break things like certificate authentication. Prefer usage of `TLSRoute`.
    httpRoute:
      enabled: false
      labels: {}
      # traffic: external
      annotations: {}
      # external-dns.alpha.kubernetes.io/hostname: chart-example.local

      hosts:
      - chart-example.local

      # Allows overriding the HTTPRoute apiVersion in case a different version of Gateway API is installed on the cluster.
      apiVersion: gateway.networking.k8s.io/v1

      # When HA mode is enabled and K8s service registration is being used,
      # configure the ingress to point to the OpenBao active service.
      activeService: true

      # List of ParentRefs. As the helm chart configures no gateways itself,
      # this should be set to at least one gateway with one or more HTTP listeners
      parentRefs: []
        # - name: my-gw
        #   namespace: gateway-namespace
        #   # sectionName is optional to fix to a specific listener
        #   sectionName: listener-name

      matches:
        path:
          type: PathPrefix
          value: '/'
        timeouts: {}
          # request: 10s  #Maximum time the Gateway waits to complete the full client request and response cycle.
          # backendRequest: 10s # Maximum time the Gateway waits for a response from the backend service.
      filters: []
      # - type: RequestHeaderModifier
      #   requestHeaderModifier:
      #     set:
      #       - name: X-Forwarded-Proto
      #         value: https

    # If TLS is enable on server (see global.tlsDisable) the gateway must be configured
    # with BackendTLSPolicy to correctly handles TLS connection with server in case TLS termination happens at gateway
    tlsPolicy:
      enabled: false
      labels: {}
      # traffic: external
      annotations: {}
      # external-dns.alpha.kubernetes.io/hostname: chart-example.local

      # Allows overriding the BackendTLSPolicy apiVersion in case a different version of Gateway API is installed on the cluster.
      apiVersion: gateway.networking.k8s.io/v1

      # When HA mode is enabled and K8s service registration is being used,
      # configure the ingress to point to the OpenBao active service.
      activeService: true

      # Identifies an API object to apply the policy to.
      # If no one is specified the default is to target the OpenBao service
      targetRefs: []

      validation: {}
      # caCertificateRefs:
      # - kind: ConfigMap
      #   name: vault-ca

  # hostAliases is a list of aliases to be added to /etc/hosts. Specified as a YAML list.
  hostAliases: []
  # - ip: 127.0.0.1
  #   hostnames:
  #     - chart-example.local

  # OpenShift only - create a route to expose the service
  # By default the created route will be of type passthrough
  route:
    enabled: false

    # When HA mode is enabled and K8s service registration is being used,
    # configure the route to point to the OpenBao active service.
    activeService: true

    labels: {}
    annotations: {}
    host: chart-example.local
    # tls will be passed directly to the route's TLS config, which
    # can be used to configure other termination methods that terminate
    # TLS at the router
    tls:
      termination: passthrough

  # authDelegator enables a cluster role binding to be attached to the service
  # account.  This cluster role binding can be used to setup Kubernetes auth
  # method. See https://openbao.org/docs/auth/kubernetes
  authDelegator:
    enabled: true

  # -- extraInitContainers is a list of init containers. Specified as a YAML list.
  # This is useful if you need to run a script to provision TLS certificates or
  # write out configuration files in a dynamic way.
  extraInitContainers: []
    # # This example installs a plugin pulled from github into the /usr/local/libexec/vault/oauthapp folder,
    # # which is defined in the volumes value.
    # - name: oauthapp
    #   image: "alpine"
    #   command: [sh, -c]
    #   args:
    #     - cd /tmp &&
    #       wget https://github.com/puppetlabs/vault-plugin-secrets-oauthapp/releases/download/v1.2.0/vault-plugin-secrets-oauthapp-v1.2.0-linux-amd64.tar.xz -O oauthapp.xz &&
    #       tar -xf oauthapp.xz &&
    #       mv vault-plugin-secrets-oauthapp-v1.2.0-linux-amd64 /usr/local/libexec/vault/oauthapp &&
    #       chmod +x /usr/local/libexec/vault/oauthapp
    #   volumeMounts:
    #     - name: plugins
    #       mountPath: /usr/local/libexec/vault

  # extraContainers is a list of sidecar containers. Specified as a YAML list.
  extraContainers: null

  # -- shareProcessNamespace enables process namespace sharing between OpenBao and the extraContainers
  # This is useful if OpenBao must be signaled, e.g. to send a SIGHUP for a log rotation
  shareProcessNamespace: false

  # -- extraArgs is a string containing additional OpenBao server arguments.
  extraArgs: ""

  # -- extraPorts is a list of extra ports. Specified as a YAML list.
  # This is useful if you need to add additional ports to the statefulset in dynamic way.
  extraPorts: []
    # - containerPort: 8300
    #   name: http-monitoring

  # Used to define custom readinessProbe settings
  readinessProbe:
    enabled: true
    # If you need to use a http path instead of the default exec
    # path: /v1/sys/health?standbyok=true

    # Port number on which readinessProbe will be checked.
    port: 8200
    # When a probe fails, Kubernetes will try failureThreshold times before giving up
    failureThreshold: 2
    # Number of seconds after the container has started before probe initiates
    initialDelaySeconds: 5
    # How often (in seconds) to perform the probe
    periodSeconds: 5
    # Minimum consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1
    # Number of seconds after which the probe times out.
    timeoutSeconds: 3
  # Used to enable a livenessProbe for the pods
  livenessProbe:
    enabled: false
    # Used to define a liveness exec command. If provided, exec is preferred to httpGet (path) as the livenessProbe handler.
    execCommand: []
    # - /bin/sh
    # - -c
    # - /openbao/userconfig/mylivenessscript/run.sh
    # Path for the livenessProbe to use httpGet as the livenessProbe handler
    path: "/v1/sys/health?standbyok=true"
    # Port number on which livenessProbe will be checked if httpGet is used as the livenessProbe handler
    port: 8200
    # When a probe fails, Kubernetes will try failureThreshold times before giving up
    failureThreshold: 2
    # Number of seconds after the container has started before probe initiates
    initialDelaySeconds: 60
    # How often (in seconds) to perform the probe
    periodSeconds: 5
    # Minimum consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1
    # Number of seconds after which the probe times out.
    timeoutSeconds: 3

  # Optional duration in seconds the pod needs to terminate gracefully.
  # See: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/
  terminationGracePeriodSeconds: 10

  # Used to set the sleep time during the preStop step
  preStopSleepSeconds: 5

  # Used to define commands to run after the pod is ready.
  # This can be used to automate processes such as initialization
  # or bootstrapping auth methods.
  postStart: []
  # - /bin/sh
  # - -c
  # - /openbao/userconfig/myscript/run.sh

  # extraEnvironmentVars is a list of extra environment variables to set with the stateful set. These could be
  # used to include variables required for auto-unseal.
  extraEnvironmentVars: {}
    # GOOGLE_REGION: global
    # GOOGLE_PROJECT: myproject
    # GOOGLE_APPLICATION_CREDENTIALS: /openbao/userconfig/myproject/myproject-creds.json

  # extraSecretEnvironmentVars is a list of extra environment variables to set with the stateful set.
  # These variables take value from existing Secret objects.
  extraSecretEnvironmentVars: []
    # - envName: AWS_SECRET_ACCESS_KEY
    #   secretName: openbao
    #   secretKey: AWS_SECRET_ACCESS_KEY

  # Deprecated: please use 'volumes' instead.
  # extraVolumes is a list of extra volumes to mount. These will be exposed
  # to OpenBao in the path `/openbao/userconfig/<name>/`. The value below is
  # an array of objects, examples are shown below.
  extraVolumes: []
    # - type: secret (or "configMap")
    #   name: my-secret
    #   path: null # default is `/openbao/userconfig`

  # volumes is a list of volumes made available to all containers. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumes: null
  #   - name: plugins
  #     emptyDir: {}

  # volumeMounts is a list of volumeMounts for the main server container. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumeMounts: null
  #   - mountPath: /usr/local/libexec/vault
  #     name: plugins
  #     readOnly: true

  # Affinity Settings
  # Commenting out or setting as empty the affinity variable, will allow
  # deployment to single node services such as Minikube
  # This should be either a multi-line string or YAML matching the PodSpec's affinity field.
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ template "openbao.name" . }}
              app.kubernetes.io/instance: "{{ .Release.Name }}"
              component: server
          topologyKey: kubernetes.io/hostname

  # Topology settings for server pods
  # ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
  # This should be either a multi-line string or YAML matching the topologySpreadConstraints array
  # in a PodSpec.
  topologySpreadConstraints: []

  # Toleration Settings for server pods
  # This should be either a multi-line string or YAML matching the Toleration array
  # in a PodSpec.
  tolerations: []

  # nodeSelector labels for server pod assignment, formatted as a multi-line string or YAML map.
  # ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#nodeselector
  # Example:
  # nodeSelector:
  #   beta.kubernetes.io/arch: amd64
  nodeSelector: {}

  # Enables network policy for server pods
  networkPolicy:
    enabled: false
    egress: []
    # egress:
    # - to:
    #   - ipBlock:
    #       cidr: 10.0.0.0/24
    #   ports:
    #   - protocol: TCP
    #     port: 443
    ingress:
      - from:
          - namespaceSelector: {}
        ports:
          - port: 8200
            protocol: TCP
          - port: 8201
            protocol: TCP

  # Priority class for server pods
  priorityClassName: ""

  # Extra labels to attach to the server pods
  # This should be a YAML map of the labels to apply to the server pods
  extraLabels: {}

  # Extra annotations to attach to the server pods
  # This can either be YAML or a YAML-formatted multi-line templated string map
  # of the annotations to apply to the server pods
  annotations: {}

  # Add an annotation to the server configmap and the statefulset pods,
  # vaultproject.io/config-checksum, that is a hash of the OpenBao configuration.
  # This can be used together with an OnDelete deployment strategy to help
  # identify which pods still need to be deleted during a deployment to pick up
  # any configuration changes.
  configAnnotation: false

  # -- TLS configuration for the OpenBao server listener (end-to-end encryption).
  # This block is only effective when `global.tlsDisable` is set to `false`.
  # When enabled, the server listener is configured with `tls_cert_file` /
  # `tls_key_file`, the TLS secret is mounted into the server pod, `BAO_CACERT`
  # is exported so that in-cluster traffic and probes verify the server
  # certificate against the CA, and cluster/replication traffic use TLS as well.
  tls:
    # -- How the server TLS certificate is provisioned. One of:
    #   certManager    - a cert-manager Certificate resource is created by this
    #                    chart (see certManager.* below). Recommended.
    #   rawCerts       - the certificate/key are supplied inline via
    #                    `server.tls.certs.crt` / `server.tls.certs.key` and this
    #                    chart creates a kubernetes.io/tls secret from them.
    #   existingSecret - a pre-existing Kubernetes TLS secret (kubernetes.io/tls)
    #                    is used. Set `secretName` to its name.
    source: certManager

    # -- Name of the Kubernetes secret holding the server certificate.
    # For source=certManager this is the secret cert-manager writes to (created
    # by this chart). For source=rawCerts this is the secret this chart creates
    # from the inline PEM material below. For source=existingSecret this must be
    # an existing secret of type kubernetes.io/tls containing tls.crt, tls.key
    # and ca.crt. If empty, defaults to `<fullname>-tls`.
    secretName: ""

    # -- Inline PEM material, used only when source=rawCerts. When both crt and
    # key are set the chart creates a kubernetes.io/tls secret (via Helm
    # pre-install/pre-upgrade hooks) named per `secretName` (default
    # `<fullname>-tls`). Optionally provide `ca` to populate `ca.crt` so that
    # BAO_CACERT, probes and metrics can verify against the CA; if omitted,
    # verification against the CA is not possible and metrics scraping should set
    # `serverTelemetry.serviceMonitor.insecureSkipVerify: true`.
    certs:
      crt: ""
      key: ""
      ca: ""

    # -- Keys inside the TLS secret. Defaults follow the kubernetes.io/tls and
    # cert-manager conventions.
    certKey: tls.crt
    keyKey: tls.key
    # -- Key containing the CA certificate used to verify the server cert.
    # Used for `BAO_CACERT`, probes, snapshot agent and metrics scraping.
    caKey: ca.crt

    # -- Directory the TLS secret is mounted into inside the server container.
    mountPath: /openbao/tls

    # -- Minimum accepted TLS version for the listener. One of tls10, tls11,
    # tls12, tls13. tls12 is the recommended floor.
    tlsMinVersion: tls12

    # -- Optional explicit cipher suite list for the listener (comma-separated
    # OpenSSL/Go names). Leave empty to use OpenBao defaults. Only affects
    # TLS 1.2; TLS 1.3 cipher suites are not configurable.
    tlsCipherSuites: ""

    # cert-manager settings, used only when source=certManager.
    certManager:
      # -- When true, this chart creates a self-signed cert-manager `Issuer`
      # named `<fullname>-issuer` and uses it to sign the server certificate.
      # This mirrors the seaweedfs pattern where the chart bootstraps its own
      # issuer, so TLS can be enabled without pre-creating an Issuer. Ignored
      # when `clusterIssuerName` is set. When false, `issuerRef` below is used.
      generateIssuer: false

      # -- Name of an existing cert-manager `ClusterIssuer` to sign the server
      # certificate. When set, it takes precedence over both `generateIssuer`
      # and `issuerRef` (the certificate's issuerRef.kind becomes ClusterIssuer).
      clusterIssuerName: ""

      # -- Reference to the cert-manager issuer used to sign the server cert.
      # Used only when `generateIssuer` is false and `clusterIssuerName` is empty.
      issuerRef:
        name: openbao-ca-issuer
        # kind is Issuer or ClusterIssuer
        kind: Issuer
        group: cert-manager.io

      # -- Requested certificate duration and renewal window. `duration` takes
      # precedence; when it is empty, `durationDays` is used (converted to hours,
      # durationDays * 24h) to match the seaweedfs convention.
      duration: 8760h    # 1 year
      durationDays: 365
      renewBefore: 720h  # 30 days

      # -- Private key configuration for the generated certificate. OpenBao
      # defaults to ECDSA (this is a deliberate deviation from seaweedfs, which
      # uses RSA 2048); switch to RSA/PKCS1/2048 here if strict parity is needed.
      privateKey:
        algorithm: ECDSA
        size: 256
        rotationPolicy: Always

      # -- Additional Subject Alternative Names (DNS) to include in the
      # certificate on top of the service/headless/pod DNS names generated by
      # the chart. Useful for ingress hostnames or external addresses.
      # `extraSans` (list) and `subjectAlternativeName.additionalDnsNames`
      # (map/list, seaweedfs-compatible) are both honoured and merged.
      extraSans: []
      # - vault.example.com

      # -- Additional IP Subject Alternative Names to include. Both `extraIpSans`
      # and `subjectAlternativeName.additionalIpAddresses` are honoured.
      extraIpSans: []
      # - 127.0.0.1

      # -- Seaweedfs-compatible SAN block. Entries here are appended to the
      # certificate's dnsNames / ipAddresses in addition to `extraSans` /
      # `extraIpSans` above.
      subjectAlternativeName:
        additionalDnsNames: {}
        additionalIpAddresses: {}

  # Enables a headless service to be used by the OpenBao Statefulset
  service:
    enabled: true
    # Enable or disable the openbao-active service, which selects OpenBao pods that
    # have labeled themselves as the cluster leader with `openbao-active: "true"`.
    active:
      enabled: true
      # Extra annotations for the service definition. This can either be YAML or a
      # YAML-formatted multi-line templated string map of the annotations to apply
      # to the active service.
      annotations: {}
      # Extra labels for the service definition.
      # This should be a YAML map of the labels to apply to the active service
      extraLabels: {}
    # Enable or disable the openbao-standby service, which selects OpenBao pods that
    # have labeled themselves as a cluster follower with `openbao-active: "false"`.
    standby:
      enabled: true
      # Extra annotations for the service definition. This can either be YAML or a
      # YAML-formatted multi-line templated string map of the annotations to apply
      # to the standby service.
      annotations: {}
      # Extra labels for the service definition.
      # This should be a YAML map of the labels to apply to the standby service
      extraLabels: {}
    headless:
      # Extra annotations for the headless service definition. This can either be YAML or a
      # YAML-formatted multi-line templated string map of the annotations to apply
      # to the headless service.
      annotations: {}
    # If enabled, the service selectors will include `app.kubernetes.io/instance: {{ .Release.Name }}`
    # When disabled, services may select OpenBao pods not deployed from the chart.
    # Does not affect the headless openbao-internal service with `ClusterIP: None`
    instanceSelector:
      enabled: true
    # clusterIP controls whether a Cluster IP address is attached to the
    # OpenBao service within Kubernetes.  By default, the OpenBao service will
    # be given a Cluster IP address, set to None to disable.  When disabled
    # Kubernetes will create a "headless" service.  Headless services can be
    # used to communicate with pods directly through DNS instead of a round-robin
    # load balancer.
    # clusterIP: None

    # Configures the service type for the main OpenBao service.  Can be ClusterIP
    # or NodePort.
    # type: ClusterIP

    # The IP family and IP families options are to set the behaviour in a dual-stack environment.
    # Omitting these values will let the service fall back to whatever the CNI dictates the defaults
    # should be.
    # These are only supported for kubernetes versions >=1.23.0
    #
    # Configures the service's supported IP family policy, can be either:
    #     SingleStack: Single-stack service. The control plane allocates a cluster IP for the Service, using the first configured service cluster IP range.
    #     PreferDualStack: Allocates IPv4 and IPv6 cluster IPs for the Service.
    #     RequireDualStack: Allocates Service .spec.ClusterIPs from both IPv4 and IPv6 address ranges.
    ipFamilyPolicy: ""

    # Sets the families that should be supported and the order in which they should be applied to ClusterIP as well.
    # Can be IPv4 and/or IPv6.
    ipFamilies: []

    # Do not wait for pods to be ready before including them in the services'
    # targets. Does not apply to the headless service, which is used for
    # cluster-internal communication.
    publishNotReadyAddresses: true

    # The externalTrafficPolicy can be set to either Cluster or Local
    # and is only valid for LoadBalancer and NodePort service types.
    # The default value is Cluster.
    # ref: https://kubernetes.io/docs/concepts/services-networking/service/#external-traffic-policy
    externalTrafficPolicy: Cluster

    # If type is set to "NodePort", a specific nodePort value can be configured,
    # will be random if left blank.
    # nodePort: 30000

    # When HA mode is enabled
    # If type is set to "NodePort", a specific nodePort value can be configured,
    # will be random if left blank.
    # activeNodePort: 30001

    # When HA mode is enabled
    # If type is set to "NodePort", a specific nodePort value can be configured,
    # will be random if left blank.
    # standbyNodePort: 30002

    # Port on which OpenBao server is listening
    port: 8200
    # Target port to which the service should be mapped to
    targetPort: 8200

    # -- extraPorts is a list of extra ports. Specified as a YAML list.
    # This is useful if you need to add additional ports to the server service in dynamic way.
    extraPorts: []
    # - name: metrics
    #   port: 9101
    #   targetPort: 9101

    # Extra annotations for the service definition. This can either be YAML or a
    # YAML-formatted multi-line templated string map of the annotations to apply
    # to the service.
    annotations: {}
    # Extra labels for the service definition.
    # This should be a YAML map of the labels to apply to the service
    extraLabels: {}

  # This configures the OpenBao Statefulset to create a PVC for data
  # storage when using the file or raft backend storage engines.
  # See https://openbao.org/docs/configuration/storage to know more
  dataStorage:
    enabled: true
    # Size of the PVC created
    size: 10Gi
    # Location where the PVC will be mounted.
    mountPath: "/openbao/data"
    # Name of the storage class to use.  If null it will use the
    # configured default Storage Class.
    storageClass: null
    # Access Mode of the storage device being used for the PVC
    accessMode: ReadWriteOnce
    # Annotations to apply to the PVC
    annotations: {}
    # Labels to apply to the PVC
    labels: {}

  # Persistent Volume Claim (PVC) retention policy
  # ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
  # Example:
  # persistentVolumeClaimRetentionPolicy:
  #   whenDeleted: Retain
  #   whenScaled: Retain
  persistentVolumeClaimRetentionPolicy: {}

  # This configures the OpenBao Statefulset to create a PVC for audit
  # logs.  Once OpenBao is deployed, initialized, and unsealed, OpenBao must
  # be configured to use this for audit logs.  This will be mounted to
  # /openbao/audit
  # See https://openbao.org/docs/audit to know more
  auditStorage:
    enabled: false
    # Size of the PVC created
    size: 10Gi
    # Location where the PVC will be mounted.
    mountPath: "/openbao/audit"
    # Name of the storage class to use.  If null it will use the
    # configured default Storage Class.
    storageClass: null
    # Access Mode of the storage device being used for the PVC
    accessMode: ReadWriteOnce
    # Annotations to apply to the PVC
    annotations: {}
    # Labels to apply to the PVC
    labels: {}

  # Run OpenBao in "dev_mode". Despite the name, this is a *persistent*
  # development server: it uses the `file` storage backend on the data PVC
  # (server.dataStorage) so data survives pod restarts, and a postStart hook
  # automatically initializes it on first boot and auto-unseals it on every
  # (re)start. Intended for development / testing, not production.
  dev_mode:
    enabled: true

    # -- HCL configuration for the persistent dev server. Uses the `file`
    # storage backend on the data PVC (server.dataStorage) so data persists
    # across restarts. The listener always runs plain HTTP: dev mode does not
    # provision TLS material, so do not enable TLS for dev deployments.
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = 1
      }
      storage "file" {
        path = "{{ .Values.server.dataStorage.mountPath }}"
      }


  # Run OpenBao in "standalone" mode. This is the default mode that will deploy if
  # no arguments are given to helm. This requires a PVC for data storage to use
  # the "file" backend.  This mode is not highly available and should not be scaled
  # past a single replica.
  standalone:
    enabled: "-"

    # config is a raw string of default configuration when using a Stateful
    # deployment. Default is to use a PersistentVolumeClaim mounted at /openbao/data
    # and store data there. This is only used when using a Replica count of 1, and
    # using a stateful set. This should be HCL.

    # Note: Configuration files are stored in ConfigMaps so sensitive data
    # such as passwords should be either mounted through extraSecretEnvironmentVars
    # or through a Kube secret.  For more information see:
    # https://openbao.org/docs/platform/k8s/helm/run/#protecting-sensitive-openbao-configurations
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        {{- if .Values.global.tlsDisable }}
        tls_disable = 1
        {{- else }}
        tls_disable = 0
        tls_cert_file = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.certKey }}"
        tls_key_file  = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.keyKey }}"
        {{- if .Values.server.tls.tlsMinVersion }}
        tls_min_version = "{{ .Values.server.tls.tlsMinVersion }}"
        {{- end }}
        {{- if .Values.server.tls.tlsCipherSuites }}
        tls_cipher_suites = "{{ .Values.server.tls.tlsCipherSuites }}"
        {{- end }}
        {{- end }}
        # Enable unauthenticated metrics access (necessary for Prometheus Operator)
        #telemetry {
        #  unauthenticated_metrics_access = "true"
        #}
      }
      storage "file" {
        path = "/openbao/data"
      }

      # Example configuration for using auto-unseal, using Google Cloud KMS. The
      # GKMS keys must already exist, and the cluster must have a service account
      # that is authorized to access GCP KMS.
      #seal "gcpckms" {
      #   project     = "openbao-helm-dev"
      #   region      = "global"
      #   key_ring    = "openbao-helm-unseal-kr"
      #   crypto_key  = "openbao-helm-unseal-key"
      #}

      # Example configuration for enabling Prometheus metrics in your config.
      #telemetry {
      #  prometheus_retention_time = "30s"
      #  disable_hostname = true
      #}

  # Run OpenBao in "HA" mode. There are no storage requirements unless the audit log
  # persistence is required.  In HA mode OpenBao will configure itself to use Consul
  # for its storage backend.  The default configuration provided will work the Consul
  # Helm project by default.  It is possible to manually configure OpenBao to use a
  # different HA backend.
  ha:
    enabled: false
    replicas: 3

    # Set the api_addr configuration for OpenBao HA
    # See https://openbao.org/docs/configuration/#high-availability-parameters
    # If set to null, this will be set to the Pod IP Address
    apiAddr: null

    # Set the cluster_addr configuration for OpenBao HA
    # See https://openbao.org/docs/configuration/#high-availability-parameters
    # If set to null, this will be set to https://$(HOSTNAME).{{ template "openbao.fullname" . }}-internal:8201
    clusterAddr: null

    # Enables OpenBao's integrated Raft storage.  Unlike the typical HA modes where
    # OpenBao's persistence is external (such as Consul), enabling Raft mode will create
    # persistent volumes for OpenBao to store data according to the configuration under server.dataStorage.
    # The OpenBao cluster will coordinate leader elections and failovers internally.
    raft:
      # Enables Raft integrated storage
      enabled: false
      # Set the Node Raft ID to the name of the pod
      setNodeId: false

      # config is a raw string of default configuration when using a Stateful
      # deployment.
      # This should be HCL.

      # Note: Configuration files are stored in ConfigMaps so sensitive data
      # such as passwords should be either mounted through extraSecretEnvironmentVars
      # or through a Kube secret.  For more information see:
      # https://openbao.org/docs/platform/k8s/helm/run/#protecting-sensitive-openbao-configurations
      config: |
        ui = true

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          {{- if .Values.global.tlsDisable }}
          tls_disable = 1
          {{- else }}
          tls_disable = 0
          tls_cert_file = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.certKey }}"
          tls_key_file  = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.keyKey }}"
          {{- if .Values.server.tls.tlsMinVersion }}
          tls_min_version = "{{ .Values.server.tls.tlsMinVersion }}"
          {{- end }}
          {{- if .Values.server.tls.tlsCipherSuites }}
          tls_cipher_suites = "{{ .Values.server.tls.tlsCipherSuites }}"
          {{- end }}
          {{- end }}
          # Enable unauthenticated metrics access (necessary for Prometheus Operator)
          #telemetry {
          #  unauthenticated_metrics_access = "true"
          #}
        }
        storage "raft" {
          path = "/openbao/data"
          retry_join {
            leader_api_addr = "{{ include "openbao.scheme" . }}://{{ include "openbao.fullname" . }}-0.{{ include "openbao.fullname" . }}-internal:8200"
          }
          retry_join {
            leader_api_addr = "{{ include "openbao.scheme" . }}://{{ include "openbao.fullname" . }}-1.{{ include "openbao.fullname" . }}-internal:8200"
          }
          retry_join {
            leader_api_addr = "{{ include "openbao.scheme" . }}://{{ include "openbao.fullname" . }}-2.{{ include "openbao.fullname" . }}-internal:8200"
          }
        }

        service_registration "kubernetes" {}

    # config is a raw string of default configuration when using a Stateful
    # deployment. Default is to use a Consul for its HA storage backend.
    # This should be HCL.

    # Note: Configuration files are stored in ConfigMaps so sensitive data
    # such as passwords should be either mounted through extraSecretEnvironmentVars
    # or through a Kube secret.  For more information see:
    # https://openbao.org/docs/platform/k8s/helm/run/#protecting-sensitive-openbao-configurations
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        {{- if .Values.global.tlsDisable }}
        tls_disable = 1
        {{- else }}
        tls_cert_file = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.certKey }}"
        tls_key_file  = "{{ .Values.server.tls.mountPath }}/{{ .Values.server.tls.keyKey }}"
        {{- if .Values.server.tls.tlsMinVersion }}
        tls_min_version = "{{ .Values.server.tls.tlsMinVersion }}"
        {{- end }}
        {{- if .Values.server.tls.tlsCipherSuites }}
        tls_cipher_suites = "{{ .Values.server.tls.tlsCipherSuites }}"
        {{- end }}
        {{- end }}
      }
      storage "consul" {
        path = "openbao"
        address = "HOST_IP:8500"
      }

      service_registration "kubernetes" {}

      # Example configuration for using auto-unseal, using Google Cloud KMS. The
      # GKMS keys must already exist, and the cluster must have a service account
      # that is authorized to access GCP KMS.
      #seal "gcpckms" {
      #   project     = "openbao-helm-dev-246514"
      #   region      = "global"
      #   key_ring    = "openbao-helm-unseal-kr"
      #   crypto_key  = "openbao-helm-unseal-key"
      #}

      # Example configuration for enabling Prometheus metrics.
      # If you are using Prometheus Operator you can enable a ServiceMonitor resource below.
      # You may wish to enable unauthenticated metrics in the listener block above.
      #telemetry {
      #  prometheus_retention_time = "30s"
      #  disable_hostname = true
      #}

    # A disruption budget limits the number of pods of a replicated application
    # that are down simultaneously from voluntary disruptions
    disruptionBudget:
      enabled: true

      # maxUnavailable will default to (n/2)-1 where n is the number of
      # replicas. If you'd like a custom value, you can specify an override here.
      maxUnavailable: 0

  # Definition of the serviceAccount used to run Vault.
  # These options are also used when using an external OpenBao server to validate
  # Kubernetes tokens.
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
    # Create a Secret API object to store a non-expiring token for the service account.
    # Prior to v1.24.0, Kubernetes used to generate this secret for each service account by default.
    # Kubernetes now recommends using short-lived tokens from the TokenRequest API or projected volumes instead if possible.
    # For more details, see https://kubernetes.io/docs/concepts/configuration/secret/#serviceaccount-token-secrets
    # serviceAccount.create must be equal to 'true' in order to use this feature.
    createSecret: false
    # Extra annotations for the serviceAccount definition. This can either be
    # YAML or a YAML-formatted multi-line templated string map of the
    # annotations to apply to the serviceAccount.
    annotations: {}
    # Extra labels to attach to the serviceAccount
    # This should be a YAML map of the labels to apply to the serviceAccount
    extraLabels: {}
    # Enable or disable a service account role binding with the permissions required for
    # OpenBao's Kubernetes service_registration config option.
    # See https://openbao.org/docs/configuration/service-registration/kubernetes
    serviceDiscovery:
      enabled: true

  # Settings for the statefulSet used to run OpenBao.
  statefulSet:
    # Extra annotations for the statefulSet. This can either be YAML or a
    # YAML-formatted multi-line templated string map of the annotations to apply
    # to the statefulSet.
    annotations: {}

    # Set the pod and container security contexts.
    # If not set, these will default to, and for *not* OpenShift:
    # pod:
    #   runAsNonRoot: true
    #   runAsGroup: {{ .Values.server.gid | default 1000 }}
    #   runAsUser: {{ .Values.server.uid | default 100 }}
    #   fsGroup: {{ .Values.server.gid | default 1000 }}
    #   seccompProfile:
    #     type: RuntimeDefault
    # container:
    #   allowPrivilegeEscalation: false
    #
    # If not set, these will default to, and for OpenShift:
    # pod: {}
    # container: {}
    securityContext:
      pod: {}
      container: {}

  # Should the server pods run on the host network
  hostNetwork: false

# OpenBao UI
ui:
  # True if you want to create a Service entry for the OpenBao UI.
  #
  # serviceType can be used to control the type of service created. For
  # example, setting this to "LoadBalancer" will create an external load
  # balancer (for supported K8S installations) to access the UI.
  enabled: false
  publishNotReadyAddresses: true
  # The service should only contain selectors for active OpenBao pod
  activeOpenbaoPodOnly: false
  serviceType: "ClusterIP"
  serviceNodePort: null
  externalPort: 8200
  targetPort: 8200

  # The IP family and IP families options are to set the behaviour in a dual-stack environment.
  # Omitting these values will let the service fall back to whatever the CNI dictates the defaults
  # should be.
  # These are only supported for kubernetes versions >=1.23.0
  #
  # Configures the service's supported IP family, can be either:
  #     SingleStack: Single-stack service. The control plane allocates a cluster IP for the Service, using the first configured service cluster IP range.
  #     PreferDualStack: Allocates IPv4 and IPv6 cluster IPs for the Service.
  #     RequireDualStack: Allocates Service .spec.ClusterIPs from both IPv4 and IPv6 address ranges.
  serviceIPFamilyPolicy: ""

  # Sets the families that should be supported and the order in which they should be applied to ClusterIP as well
  # Can be IPv4 and/or IPv6.
  serviceIPFamilies: []

  # The externalTrafficPolicy can be set to either Cluster or Local
  # and is only valid for LoadBalancer and NodePort service types.
  # The default value is Cluster.
  # ref: https://kubernetes.io/docs/concepts/services-networking/service/#external-traffic-policy
  externalTrafficPolicy: Cluster

  # loadBalancerSourceRanges:
  #   - 10.0.0.0/16
  #   - 1.78.23.3/32

  # loadBalancerIP:

  # Extra annotations to attach to the ui service
  # This can either be YAML or a YAML-formatted multi-line templated string map
  # of the annotations to apply to the ui service
  annotations: {}

  # Extra labels for the service definition.
  # This should be a YAML map of the labels to apply to the ui service
  extraLabels: {}

# OpenBao is able to collect and publish various runtime metrics.
# Enabling this feature requires setting adding `telemetry{}` stanza to
# the OpenBao configuration. There are a few examples included in the `config` sections above.
#
# For more information see:
# https://openbao.org/docs/configuration/telemetry
# https://openbao.org/docs/internals/telemetry
serverTelemetry:
  # Enable support for the Prometheus Operator. If authorization is not required for
  # OpenBao's metrics endpoint, the following OpenBao server `telemetry{}` config must be included
  # in the `listener "tcp"{}` stanza
  #  telemetry {
  #    unauthenticated_metrics_access = "true"
  #  }
  #
  # See the `standalone.config` for a more complete example of this.
  #
  # In addition, a top level `telemetry{}` stanza must also be included in the OpenBao configuration:
  #
  # example:
  #  telemetry {
  #    prometheus_retention_time = "30s"
  #    disable_hostname = true
  #  }
  #
  # Configuration for monitoring the OpenBao server.
  serviceMonitor:
    # The Prometheus operator *must* be installed before enabling this feature,
    # if not the chart will fail to install due to missing CustomResourceDefinitions
    # provided by the operator.
    #
    # Instructions on how to install the Helm chart can be found here:
    #  https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
    # More information can be found here:
    #  https://github.com/prometheus-operator/prometheus-operator
    #  https://github.com/prometheus-operator/kube-prometheus

    # Enable deployment of the OpenBao Server ServiceMonitor CustomResource.
    enabled: false

    # Selector labels to add to the ServiceMonitor.
    # When empty, defaults to:
    #  release: prometheus
    selectors: {}

    # -- Port which Prometheus uses when scraping metrics. If empty will use `openbao.scheme` helper for its value
    port: ""

    # -- scheme to use when Prometheus scrapes metrics. If empty will use `openbao.scheme` helper for its value
    scheme: ""

    # Interval at which Prometheus scrapes metrics
    interval: 30s

    # Timeout for Prometheus scrapes
    scrapeTimeout: 10s

    # tlsConfig used for scraping the Vault metrics API.
    tlsConfig: {}

    # -- When TLS is enabled (global.tlsDisable=false) and tlsConfig is not set
    # explicitly, controls whether the ServiceMonitor verifies the server
    # certificate. Set to false (recommended) to verify against the server TLS
    # CA. When true, certificate verification is skipped. When TLS is disabled
    # this setting has no effect.
    insecureSkipVerify: false

    # authorization used for scraping the Vault metrics API.
    authorization: {}

    # scrapeClass to be used by the serviceMonitor
    scrapeClass: ""

  prometheusRules:
    # The Prometheus operator *must* be installed before enabling this feature,
    # if not the chart will fail to install due to missing CustomResourceDefinitions
    # provided by the operator.

    # Deploy the PrometheusRule custom resource for AlertManager based alerts.
    # Requires that AlertManager is properly deployed.
    enabled: false

    # Selector labels to add to the PrometheusRules.
    # When empty, defaults to:
    #  release: prometheus
    selectors: {}

    # Some example rules.
    rules: []
    #  - alert: vault-HighResponseTime
    #    annotations:
    #      message: The response time of OpenBao is over 500ms on average over the last 5 minutes.
    #    expr: vault_core_handle_request{quantile="0.5", namespace="mynamespace"} > 500
    #    for: 5m
    #    labels:
    #      severity: warning
    #  - alert: vault-HighResponseTime
    #    annotations:
    #      message: The response time of OpenBao is over 1s on average over the last 10 minutes.
    #    expr: vault_core_handle_request{quantile="0.5", namespace="mynamespace"} > 1000
    #    for: 10m
    #    labels:
    #      severity: critical

  grafanaDashboard:
    # Enable deployment of the OpenBao Grafana dashboard.
    # https://grafana.com/grafana/dashboards/23725-openbao
    enabled: false

    # Namespace to deploy the dashboard ConfigMap to.
    # Defaults to this chart's namespace.
    namespace: ""

    # Add `grafana_dashboard: "1"` default label
    defaultLabel: true

    # Extra labels for dashboard ConfigMap
    extraLabel: {}

    # Extra annotations for dashboard ConfigMap
    extraAnnotations: {}

# extraObjects allows you to add any extra Kubernetes manifests to this chart
extraObjects: []
# Examples:
# Defining as a Structured YAML Object Example:
#   extraObjects:
#   - apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: cert-manager-configmap-{{ .Release.Name }}
#
# Using a String for Advanced Templating Example:
#   extraObjects:
#   - |
#     apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: cert-manager-configmap-{{ include "some-other-template" }}

# Snapshot Agent Configuration
snapshotAgent:
  # whether or not to enable the snapshot agent cronjob
  enabled: false
  # extra Annotations for the job
  annotations: {}
  # schedule of the cronjob
  schedule: "*/15 * * * *"
  restartPolicy: OnFailure
  # service account settings for the snapshot agent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    extraLabels: {}
  # The image settings for the snapshot agent
  image:
    repository: ghcr.io/openbao/openbao-snapshot-agent
    tag: 0.3.0

  # -- List of extraVolumes made available to the snapshot cronjob container.
  extraVolumes: []
  #   - name: openbao-tls
  #     secret:
  #       defaultMode: 420
  #       secretName: openbao-tls

  # -- List of additional volumeMounts for the snapshot cronjob container.
  extraVolumeMounts: []
  #   - mountPath: /openbao/tls/ca.crt
  #     name: openbao-tls
  #     readOnly: true
  #     subPath: ca.crt

  # s3CredentialsSecret to use
  s3CredentialsSecret: "my-s3-credentials"

  # configuration for the snapshot agent
  config:
    s3Host: "s3.eu-east-1.amazonaws.com"
    s3Bucket: "openbao-snapshots"
    s3Uri: "s3://openbao-snapshots"
    s3ExpireDays: "14"
    s3cmdExtraFlag: "-v"
    baoAuthPath: "kubernetes"
    baoRole: "snapshot"

  # configuration of the CronJobs resources
  resources: {}

  # -- Map of extra environment variables to set in the snapshot-agent cronjob
  extraEnvironmentVars: {}
    # BAO_CACERT: /openbao/tls/ca.crt

  # --  List of extra environment variables to set in the snapshot-agent cronjob
  # These variables take value from existing Secret objects.
  extraSecretEnvironmentVars: []
    # - envName: AWS_SECRET_ACCESS_KEY
    #   secretName: openbao
    #   secretKey: AWS_SECRET_ACCESS_KEY

  # Security context for the pod template and the snapshotAgent container
  # The default pod securityContext is:
  #   seccompProfile
  #     type: RuntimeDefault
  #   runAsNonRoot: true
  #   runAsGroup: {{ .Values.snapshotAgent.gid | default 1000 }}
  #   runAsUser: {{ .Values.snapshotAgent.uid | default 100 }}
  #   fsGroup: {{ .Values.snapshotAgent.gid | default 1000 }}
  # and for container is
  #    allowPrivilegeEscalation: false
  #    capabilities:
  #      drop:
  #        - ALL
  securityContext:
    pod: {}
    container: {}

  # Toleration Settings for snapshot-agent cronjob pod
  # This should be either a multi-line string or YAML matching the Toleration array
  # in a PodSpec.
  tolerations: []
